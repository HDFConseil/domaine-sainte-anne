<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Actualités — Domaine de Sainte Anne</title>
  <meta name="description" content="Les dernières actualités du Domaine de Sainte Anne — événements, vendanges, soirées dégustation." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Actualités — Domaine de Sainte Anne" />
  <meta property="og:description" content="Les dernières actualités du Domaine de Sainte Anne — événements, vendanges, soirées dégustation." />
  <meta property="og:image" content="https://domainedesainteanne.fr/images/accueil-vigne.jpeg" />
  <meta property="og:url" content="https://domainedesainteanne.fr/actualites.html" />
  <meta name="twitter:card" content="summary_large_image" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bordeaux: #61394a;
      --bordeaux-dark: #3a2530;
      --or: #c9a84c;
      --or-light: #e8d5a3;
      --creme-pale: #f5f0f2;
      --blanc: #fdfbfc;
      --noir: #171717;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Jost', sans-serif; background: var(--creme-pale); color: var(--noir); }

    /* NAV */
    nav { background: var(--bordeaux); padding: 0 2.5rem; display: flex; align-items: center; justify-content: space-between; height: 72px; }
    .nav-logo { display: flex; align-items: center; text-decoration: none; }
    .nav-logo img { height: 60px; width: auto; object-fit: contain; }
    .nav-back { text-decoration: none; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.7); transition: color 0.2s; }
    .nav-back:hover { color: var(--or); }

    /* HEADER */
    .page-header { background: var(--bordeaux); padding: 4rem 2rem 3rem; text-align: center; }
    .page-header p { font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase; color: var(--or); margin-bottom: 1rem; }
    .page-header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 400; color: #fff; }
    .page-header h1 em { font-style: italic; color: var(--or-light); }

    /* ACTUALITÉS */
    .actu-container { max-width: 820px; margin: 0 auto; padding: 4rem 2rem; }
    .actu-card { background: var(--blanc); margin-bottom: 2rem; padding: 2.5rem; border-left: 3px solid var(--or); scroll-margin-top: 2rem; transition: box-shadow 0.6s ease; }
    .actu-card.highlight { box-shadow: 0 0 0 2px var(--or); }
    .actu-card-date { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--or); margin-bottom: 0.75rem; }
    .actu-card-titre { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 400; color: var(--bordeaux-dark); margin-bottom: 0.5rem; line-height: 1.2; }
    .actu-card-sous-titre { font-size: 1rem; font-weight: 300; color: var(--bordeaux); margin-bottom: 1rem; font-style: italic; }
    .actu-card-texte { font-size: 0.95rem; font-weight: 300; line-height: 1.85; color: #555; white-space: pre-wrap; }
    .actu-card-lien { display: inline-block; margin-top: 1.25rem; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--bordeaux); text-decoration: none; border-bottom: 1px solid var(--or); padding-bottom: 2px; transition: color 0.2s; }
    .actu-card-lien:hover { color: var(--or); }
    .actu-share { display: flex; gap: 0.75rem; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid #eee; align-items: center; }
    .actu-share span { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: #aaa; margin-right: 0.25rem; }
    .actu-share-btn { display: inline-flex; align-items: center; gap: 6px; text-decoration: none; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--bordeaux); border: 1px solid #e0d8db; padding: 6px 12px; transition: all 0.2s; background: none; cursor: pointer; font-family: 'Jost', sans-serif; }
    .actu-share-btn:hover { border-color: var(--bordeaux); background: var(--creme-pale); }
    .loading { text-align: center; padding: 4rem; color: #999; font-style: italic; }
    .empty { text-align: center; padding: 4rem; color: #bbb; font-style: italic; }

    /* FOOTER */
    footer { background: var(--noir); padding: 2rem; text-align: center; }
    footer p { font-size: 11px; color: rgba(255,255,255,0.3); }

    @media (max-width: 600px) {
      .actu-card { padding: 1.5rem; }
      .actu-container { padding: 2rem 1rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="images/logo-steanne.png" alt="Domaine de Sainte Anne" />
  </a>
  <a href="index.html#actualites" class="nav-back">← Retour au site</a>
</nav>

<div class="page-header">
  <p>Domaine de Sainte Anne</p>
  <h1>Nos <em>actualités</em></h1>
</div>

<div class="actu-container" id="actu-container">
  <div class="loading">Chargement des actualités...</div>
</div>

<footer>
  <p>© 2025 SCEA Domaine de Sainte Anne — Marcorignan, Aude</p>
</footer>

<script>
  const SUPABASE_URL = 'https://ksifjyshjhjdsiinycci.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzaWZqeXNoamhqZHNpaW55Y2NpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0Mjc5NTQsImV4cCI6MjA5NTAwMzk1NH0.pLXvzDImEOiTawDbEFv9_cXOgy_rTlcl6jJEf7P4kXc';

  const { createClient } = window.supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  function partagerActu(id, titre) {
    const url = `https://domainedesainteanne.fr/actualites.html#actu-${id}`;
    if (navigator.share) {
      navigator.share({ title: titre, text: titre, url }).catch(() => {});
    } else {
      navigator.clipboard.writeText(url).then(() => {
        alert('Lien copié ! Vous pouvez le coller où vous voulez.');
      }).catch(() => {
        prompt('Copiez ce lien :', url);
      });
    }
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function renderImages(a) {
    const imgs = (a.images && a.images.length) ? a.images : (a.image_url ? [a.image_url] : []);
    if (!imgs.length) return '';
    if (imgs.length === 1) {
      return `<img src="${imgs[0]}" alt="${a.titre}" style="width:100%;max-height:320px;object-fit:cover;margin-bottom:1.5rem;" />`;
    }
    return `<div style="display:grid;grid-template-columns:repeat(${Math.min(imgs.length, 3)}, 1fr);gap:6px;margin-bottom:1.5rem;">
      ${imgs.map(url => `<img src="${url}" alt="${a.titre}" style="width:100%;height:180px;object-fit:cover;" />`).join('')}
    </div>`;
  }

  async function chargerActualites() {
    const container = document.getElementById('actu-container');
    const { data, error } = await db.from('actualites_sainte_anne')
      .select('*').order('date', { ascending: false });

    if (error || !data || data.length === 0) {
      container.innerHTML = '<div class="empty">Aucune actualité pour le moment. Revenez bientôt !</div>';
      return;
    }

    container.innerHTML = data.map(a => `
      <div class="actu-card" id="actu-${a.id}">
        ${renderImages(a)}
        <div class="actu-card-date">${formatDate(a.date)}</div>
        <h2 class="actu-card-titre">${a.titre}</h2>
        ${a.sous_titre ? `<p class="actu-card-sous-titre">${a.sous_titre}</p>` : ''}
        ${a.texte ? `<p class="actu-card-texte">${a.texte}</p>` : ''}
        ${a.lien_url ? `<a href="${a.lien_url}" target="_blank" rel="noopener" class="actu-card-lien">${a.lien_label || 'En savoir plus'} →</a>` : ''}
        <div class="actu-share">
          <span>Partager :</span>
          <a class="actu-share-btn" target="_blank" rel="noopener" href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent('https://domainedesainteanne.fr/actualites.html#actu-' + a.id)}&quote=${encodeURIComponent(a.titre)}">Facebook</a>
          <a class="actu-share-btn" target="_blank" rel="noopener" href="https://wa.me/?text=${encodeURIComponent(a.titre + ' — ' + 'https://domainedesainteanne.fr/actualites.html#actu-' + a.id)}">WhatsApp</a>
          <button class="actu-share-btn" onclick="partagerActu('${a.id}', '${a.titre.replace(/'/g, "\\'")}')">Partager</button>
        </div>
      </div>
    `).join('');
  }

  chargerActualites().then(() => {
    if (location.hash) {
      const target = document.querySelector(location.hash);
      if (target) {
        target.classList.add('highlight');
        setTimeout(() => target.classList.remove('highlight'), 2000);
      }
    }
  });
</script>
</body>
</html>
